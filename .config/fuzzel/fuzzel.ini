terminal=foot
match-mode=fzf
show-actions=yes
fields=name,generic,comment,keywords
tabs=4
layer=overlay

[colors]
background=1e1e2edd
text=cdd6f4ff
match=f38ba8ff
selection=585b70ff
selection-match=f38ba8ff
selection-text=cdd6f4ff
border=b4befeff

[border]
radius=10

[key-bindings]
prev=Control+p Shift+Tab
next=Control+n Tab
prev-with-wrap=Up
next-with-wrap=Down
